<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle de Ponto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="screen-loading" class="screen active" aria-live="polite">
    <p>Carregando…</p>
  </div>

  <div id="screen-login" class="screen">
    <!-- Preenchido por app.js: form login ou definir senha -->
  </div>

  <div id="screen-app" class="screen">
    <header class="app-header">
      <nav class="app-tabs" aria-label="Seções">
        <button type="button" id="tab-calendar" class="app-tab active">Calendário</button>
        <button type="button" id="tab-holidays" class="app-tab">Feriados</button>
      </nav>
      <button type="button" id="btn-logout" class="btn-logout">Sair</button>
    </header>
    <div id="view-calendar" class="app-view active" aria-hidden="false">
      <!-- Preenchido por app.js: navegação do mês + grade -->
    </div>
    <div id="view-holidays" class="app-view" aria-hidden="true">
      <!-- Preenchido por app.js -->
    </div>
  </div>

  <div id="screen-error" class="screen">
    <p>Erro ao carregar os dados.</p>
  </div>

  <div id="modal-edit" class="modal modal-over-day" role="dialog" aria-labelledby="modal-edit-title" aria-modal="true">
    <div class="modal-content">
      <h2 id="modal-edit-title">Editar registro</h2>
      <button type="button" class="modal-close" aria-label="Fechar">×</button>
      <form id="form-edit">
        <label>Tipo
          <select id="edit-type">
            <option value="entrada">Entrada</option>
            <option value="saída">Saída</option>
          </select>
        </label>
        <label>Data e hora
          <input type="datetime-local" id="edit-datetime" required>
        </label>
        <button type="submit">Salvar</button>
      </form>
    </div>
  </div>

  <div id="modal-add" class="modal modal-over-day" role="dialog" aria-labelledby="modal-add-title" aria-modal="true">
    <div class="modal-content">
      <h2 id="modal-add-title">Adicionar ponto</h2>
      <button type="button" class="modal-close" aria-label="Fechar">×</button>
      <form id="form-add">
        <label>Tipo
          <select id="add-type">
            <option value="entrada">Entrada</option>
            <option value="saída">Saída</option>
          </select>
        </label>
        <label>Data e hora
          <input type="datetime-local" id="add-datetime" required>
        </label>
        <button type="submit">Adicionar</button>
      </form>
    </div>
  </div>

  <div id="modal-day-detail" class="modal" role="dialog" aria-labelledby="modal-day-detail-title" aria-modal="true">
    <div class="modal-content modal-content-day-detail">
      <h2 id="modal-day-detail-title">Dia</h2>
      <button type="button" class="modal-close" aria-label="Fechar">×</button>
      <p class="day-detail-section-label">Registros</p>
      <ul id="day-detail-records" class="day-records"></ul>
      <button type="button" id="day-detail-add-point" class="btn-add-point">+ Ponto</button>
      <label class="day-detail-comment-label">Comentário do dia
        <textarea id="day-detail-comment" rows="4" maxlength="2000" autocomplete="off" placeholder="Anotações sobre este dia…"></textarea>
      </label>
      <button type="button" id="day-detail-save-comment" class="btn-primary" data-label-default="Salvar comentário">Salvar comentário</button>
      <p id="day-detail-comment-feedback" class="day-detail-save-feedback" role="status" aria-live="polite" hidden></p>
    </div>
  </div>

  <div id="modal-holiday" class="modal" role="dialog" aria-labelledby="modal-holiday-title" aria-modal="true">
    <div class="modal-content">
      <h2 id="modal-holiday-title">Feriado manual</h2>
      <button type="button" class="modal-close" aria-label="Fechar">×</button>
      <form id="form-holiday">
        <label>Data
          <input type="date" id="holiday-date" required>
        </label>
        <label>Nome
          <input type="text" id="holiday-name" required maxlength="120" autocomplete="off">
        </label>
        <button type="submit">Salvar</button>
      </form>
    </div>
  </div>

  <div id="modal-vacation" class="modal" role="dialog" aria-labelledby="modal-vacation-title" aria-modal="true">
    <div class="modal-content">
      <h2 id="modal-vacation-title">Férias</h2>
      <button type="button" class="modal-close" aria-label="Fechar">×</button>
      <form id="form-vacation">
        <label>Data de início
          <input type="date" id="vacation-start" required>
        </label>
        <label>Data de fim
          <input type="date" id="vacation-end" required>
        </label>
        <label>Nome (opcional)
          <input type="text" id="vacation-name" maxlength="120" autocomplete="off" placeholder="Férias">
        </label>
        <button type="submit">Salvar</button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    (function () {
      var isGitHubPages = (window.location.hostname || '').indexOf('github.io') !== -1;
      function loadApp() {
        var s = document.createElement('script');
        s.src = 'app.js';
        document.body.appendChild(s);
      }
      if (isGitHubPages) {
        loadApp();
      } else {
        var local = document.createElement('script');
        local.src = 'config.local.js';
        local.onload = local.onerror = loadApp;
        document.body.appendChild(local);
      }
    })();
  </script>
</body>
</html>
